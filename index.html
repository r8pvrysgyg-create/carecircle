<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CareCircle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🏡 CareCircle</h1>

  <button id="loginBtn">Sign in with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>

  <p id="user"></p>

  <hr />

  <h2>📝 Family Notes</h2>

  <input id="noteInput" placeholder="Write a note..." />
  <button id="addNote">Add</button>

  <div id="notes"></div>
<hr>

<h2>📅 Appointments</h2>

<input id="apptPerson" placeholder="Who (Grandma / Grandpa)" />
<input id="apptDoctor" placeholder="Doctor / Visit type" />
<input id="apptDate" type="date" />
<input id="apptTime" type="time" />

<button id="addAppt">Add Appointment</button>

<div id="appointments"></div>
  <!-- Firebase logic -->
  <script type="module" src="script.js"></script>

</body>
</html>
