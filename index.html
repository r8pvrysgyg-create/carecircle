<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareCircle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell"> 
    <header class="topbar">
      <div>
        <h1>🏡 CareCircle</h1>
        <p>Family care coordination</p>
      </div>

      <div class="auth-area">
        <span id="userEmail"></span>
        <button id="loginBtn">Sign in with Google</button>
        <button id="logoutBtn" class="secondary hidden">Logout</button>
      </div>
    </header>

    <main id="appContent" class="hidden">
      <section class="dashboard">
        <div class="card">
          <h2>📅 Today</h2>
          <div id="todayAppointments"></div>
        </div>

        <div class="card">
          <h2>📝 Recent Notes</h2>
          <div id="recentNotes"></div>
        </div>
      </section>

      <section class="card">
        <h2>➕ Add Appointment</h2>

        <div class="form-grid">
          <input id="apptPerson" placeholder="Grandma / Grandpa" />
          <input id="apptDoctor" placeholder="Doctor / Visit type" />
          <input id="apptLocation" placeholder="Location" />
          <input id="apptDriver" placeholder="Driver / Responsible person" />
          <input id="apptDate" type="date" />
          <input id="apptTime" type="time" />
          <textarea id="apptNotes" placeholder="Notes"></textarea>
        </div>

        <button id="addAppt">Add Appointment</button>

        <h3>Upcoming Appointments</h3>
        <div id="appointments"></div>
      </section>

      <section class="card">
        <h2>📝 Family Notes</h2>

        <textarea id="noteInput" placeholder="Write a family update..."></textarea>
        <button id="addNote">Add Note</button>

        <div id="notes"></div>
      </section>
    </main>

    <section id="signedOutMessage" class="signed-out">
      <h2>Please sign in</h2>
      <p>Only family members who sign in can view or add information.</p>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
